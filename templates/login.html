<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Go Auth System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header>
    <h1>Login</h1>
  </header>
  <main>
    <form action="/login-post" method="post">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Login</button>
    </form>

    <p class="switch-link">
      Don’t have an account? <a href="/signup">Sign up here</a>
    </p>

    <section class="oauth">
      <h2>Or login with:</h2>
      <a href="/internal/auth/google" title="Login with Google"><i class="fab fa-google fa-2x"></i></a>
      <a href="/internal/auth/github" title="Login with GitHub"><i class="fab fa-github fa-2x"></i></a>
      <a href="/internal/auth/discord" title="Login with Discord"><i class="fab fa-discord fa-2x"></i></a>
    </section>
  </main>
  <footer>
    <p>
      &copy; 2026 Go Auth System |
      <a href="/terms">Terms of Service</a> |
      <a href="/privacy">Privacy Policy</a>
    </p>
  </footer>
</body>
</html>
