<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile - Go Auth System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../static/style.css">
</head>
<body class="bg-black text-white min-h-screen flex flex-col">
  <header class="bg-gradient-to-r from-yellow-400 to-orange-500 text-black py-4 shadow-lg">
    <div class="container mx-auto text-center">
      <h1 class="text-3xl font-bold">Your Profile</h1>
    </div>
  </header>

  <main class="flex-1 container mx-auto mt-10 px-4">
    <div class="bg-gray-900 rounded-xl shadow-xl p-8 border border-yellow-400">
      <h2 class="text-2xl font-bold text-yellow-400">Account Information</h2>
      <p class="mt-4 text-gray-300"><strong>Email:</strong> {{.Email}}</p>
      <p class="mt-2 text-gray-300"><strong>Provider:</strong> {{.Provider}}</p>
      <p class="mt-2 text-gray-300"><strong>Joined:</strong> {{.JoinDate}}</p>

      <a href="/dashboard" class="mt-6 inline-block bg-gradient-to-r from-yellow-400 to-orange-500 text-black px-4 py-2 rounded-lg shadow-lg">← Back to Dashboard</a>
    </div>
  </main>

  <footer class="bg-gray-800 text-yellow-400 py-4 mt-10 text-center shadow-inner">
    <p>
      &copy; 2026 Go Auth System |
      <a href="/terms" class="hover:text-orange-400">Terms of Service</a> |
      <a href="/privacy" class="hover:text-orange-400">Privacy Policy</a>
    </p>
  </footer>
</body>
</html>
