<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings - Go Auth System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../static/style.css">
  <style>
    .fade-out {
      animation: fadeOut 3s forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      80% { opacity: 1; }
      100% { opacity: 0; display: none; }
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gradient-to-r from-yellow-400 to-orange-500 text-black py-4 shadow-lg">
    <div class="container mx-auto text-center">
      <h1 class="text-3xl font-bold">Account Settings</h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 container mx-auto mt-10 px-4">
    <div class="bg-gray-900 rounded-xl shadow-xl p-8 border border-yellow-400">
      <h2 class="text-2xl font-bold text-yellow-400">Manage Your Account</h2>
      <p class="mt-2 text-gray-300">Update your password and notification preferences below.</p>

      <!-- Success Banner -->
      {{if .Success}}
      <div id="flashMessage" class="mt-4 bg-green-600 text-white px-4 py-3 rounded-lg shadow-lg">
        ✅ Settings updated successfully!
      </div>
      {{end}}

      <!-- Error Banner -->
      {{if .Error}}
      <div id="flashMessage" class="mt-4 bg-red-600 text-white px-4 py-3 rounded-lg shadow-lg">
        ❌ {{.Error}}
      </div>
      {{end}}

      <!-- Settings Form -->
      <form action="/update-settings" method="POST" class="mt-6 space-y-6">
        <!-- Change Password -->
        <div>
          <label class="block text-gray-300 mb-2">Change Password</label>
          <input type="password" name="new_password"
                 placeholder="Enter new password"
                 class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400">
        </div>

        <!-- Notification Preferences -->
        <div>
          <label class="block text-gray-300 mb-2">Notification Preferences</label>
          <select name="notifications"
                  class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-yellow-400 focus:outline-none focus:ring-2 focus:ring-yellow-400">
            <option value="Email">Email</option>
            <option value="SMS">SMS</option>
            <option value="None">None</option>
          </select>
        </div>

        <!-- Submit Button -->
        <button type="submit"
                class="w-full bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-semibold px-6 py-3 rounded-lg shadow-lg hover:scale-105 transition">
          Save Changes
        </button>
      </form>

      <!-- Back to Dashboard -->
      <a href="/dashboard"
         class="mt-6 inline-block bg-gradient-to-r from-yellow-400 to-orange-500 text-black px-4 py-2 rounded-lg shadow-lg">
        ← Back to Dashboard
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-yellow-400 py-4 mt-10 text-center shadow-inner">
    <p>
      &copy; 2026 Go Auth System |
      <a href="/terms" class="hover:text-orange-400">Terms of Service</a> |
      <a href="/privacy" class="hover:text-orange-400">Privacy Policy</a>
    </p>
  </footer>

  <!-- Flash Message Script -->
  <script>
    window.onload = function() {
      const flash = document.getElementById("flashMessage");
      if (flash) {
        setTimeout(() => {
          flash.classList.add("fade-out");
        }, 2000); // start fading after 2 seconds
      }
    };
  </script>
</body>
</html>
