<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings - Go Auth System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../static/style.css">
</head>
<body class="bg-black text-white min-h-screen flex flex-col">
  <header class="bg-gradient-to-r from-yellow-400 to-orange-500 text-black py-4 shadow-lg">
    <div class="container mx-auto text-center">
      <h1 class="text-3xl font-bold">Account Settings</h1>
    </div>
  </header>

  <main class="flex-1 container mx-auto mt-10 px-4">
    <div class="bg-gray-900 rounded-xl shadow-xl p-8 border border-yellow-400">
      <h2 class="text-2xl font-bold text-yellow-400">Manage Your Account</h2>

      <form action="/update-settings" method="POST" class="mt-6 space-y-4">
        <div>
          <label class="block text-gray-300">Change Password</label>
          <input type="password" name="new_password" class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-yellow-400">
        </div>
        <div>
          <label class="block text-gray-300">Notification Preferences</label>
          <select name="notifications" class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white border border-yellow-400">
            <option>Email</option>
            <option>SMS</option>
            <option>None</option>
          </select>
        </div>
        <button type="submit" class="bg-gradient-to-r from-yellow-400 to-orange-500 text-black font-semibold px-6 py-2 rounded-lg shadow-lg hover:scale-105 transition">
          Save Changes
        </button>
      </form>

      <a href="/dashboard" class="mt-6 inline-block bg-gradient-to-r from-yellow-400 to-orange-500 text-black px-4 py-2 rounded-lg shadow-lg">← Back to Dashboard</a>
    </div>
  </main>

  <footer class="bg-gray-800 text-yellow-400 py-4 mt-10 text-center shadow-inner">
    <p>
      &copy; 2026 Go Auth System |
      <a href="/terms" class="hover:text-orange-400">Terms of Service</a> |
      <a href="/privacy" class="hover:text-orange-400">Privacy Policy</a>
    </p>
  </footer>
</body>
</html>
