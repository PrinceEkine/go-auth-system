<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Go Auth System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../static/style.css">
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
  <div class="bg-white shadow-lg rounded-lg p-8 w-96">
    <h2 class="text-2xl font-bold text-center mb-6">Login</h2>
    <form method="POST" action="/login">
      <div class="mb-4">
        <label class="block text-gray-700">Email</label>
        <input type="email" name="email" class="w-full px-3 py-2 border rounded-lg" required>
      </div>
      <div class="mb-4">
        <label class="block text-gray-700">Password</label>
        <input type="password" name="password" class="w-full px-3 py-2 border rounded-lg" required>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">Login</button>
    </form>
    <hr class="my-6">
    <a href="/auth/google" class="w-full block bg-red-500 text-white py-2 rounded-lg text-center mb-2">Login with Google</a>
    <a href="/auth/github" class="w-full block bg-gray-800 text-white py-2 rounded-lg text-center mb-2">Login with GitHub</a>
    <a href="/auth/discord" class="w-full block bg-indigo-600 text-white py-2 rounded-lg text-center">Login with Discord</a>
  </div>
</body>
</html>
